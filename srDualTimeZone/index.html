		<style rel="stylesheet" crossorigin>body{margin:0;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100dvh;background:#f5f5f5}body.sheet-open{overflow:hidden}.container{width:100%;max-width:800px;display:grid;grid-template-rows:auto auto 1fr auto;gap:16px;background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 12px #0000001a;position:relative}.title{text-align:center;font-size:2em;font-weight:700}.description{text-align:center;line-height:1.5;color:#444}.hidden{display:none}.grid-container{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}@media(max-width:600px){.grid-container{grid-template-columns:1fr}}.grid-item{background:#e0e0e0;display:flex;justify-content:center;align-items:center;height:100px;border-radius:8px;cursor:pointer;transition:background .2s,transform .1s;font-weight:700}#cell-tz1,#cell-time1{background:#d0e0e0}#cell-tz2,#cell-time2{background:#e0d0e0}.grid-item.selected{background:#007bff;color:#fff}.grid-item,button{touch-action:manipulation}.grid-item:hover{background:#d0d0d0;transform:scale(1.03)}.buttons{display:flex;gap:10px}.buttons button{flex:1;padding:10px;font-size:1em;border:none;border-radius:6px;cursor:pointer;background:#007bff;color:#fff}.buttons button:hover{background:#0056b3}.popover{position:fixed;left:0;right:0;bottom:0;height:70dvh;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -6px 24px #0003;z-index:1000;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease;touch-action:none}.popover.open{transform:translateY(0)}.sheet-handle{width:40px;height:5px;background:#ccc;border-radius:3px;margin:8px auto}.sheet-content{flex:1;overflow-y:auto;padding:8px}.modal-item{background:#e0e0e0;padding:8px 4px;text-align:center;border-radius:6px;cursor:pointer;font-size:.8em}.modal-item:hover{background:#d0d0d0}.modal-item.selected{background:#007bff;color:#fff;font-weight:700}</style>

	<body>
		<div class="container">
			<div class="title">Skip's Time Zone Converter</div>
			<div class="description">
				Select the Time Zones to display.<br/>
				Use buttons to adjust time,<br/>
				or click either time to edit.
			</div>
			<div class="grid-container">
				<div class="grid-item" class="grid-tz1" id="cell-tz1">Select Timezone</div>
				<div class="grid-item" class="grid-time1" id="cell-time1"></div>
				<div class="grid-item" class="grid-tz2" id="cell-tz2">Select Timezone</div>
				<div class="grid-item" class="grid-time2" id="cell-time2"></div>
			</div>
			<div class="buttons">
				<button id="btn-get-current-time">Get Current Time</button>
				<button id="btn-hour-up">&#9650; up 1 hour</button>
				<button id="btn-hour-dn">&#9660; back 1 hour</button>
			</div>
			<div id="popover" class="popover">
				<div class="sheet-handle"></div>
				<div class="sheet-content">
					<div id="tzSelector" class="tz-selector-grid"></div>
				</div>
			</div>
			<dialog id="dlg-time-modal">
				<form method="dialog">
					<label for="timeInput">Select time:</label>
					<input type="datetime-local" id="timeInput" name="timeInput" required>
					<button type="submit">Submit</button>
					<button type="button" id="btn-timeInput-cancel">Cancel</button>
				</form>
			</dialog>
		</div>
	</body>
</html>
