	<body>
		<div class="container">
			<div class="title">Skip's Time Zone Converter</div>
			<div class="description">
				Select the Time Zones to display.<br/>
				Use buttons to adjust time,<br/>
				or click either time to edit.
			</div>
			<div class="grid-container">
				<div class="grid-item" id="cell-tz1">Select Timezone</div>
				<div class="grid-item" id="cell-time1"></div>
				<div class="grid-item" id="cell-tz2">Select Timezone</div>
				<div class="grid-item" id="cell-time2"></div>
			</div>
			<div class="buttons">
				<button id="btn-get-current-time">Get Current Time</button>
				<button id="btn-hour-up">&#9650; up 1 hour</button>
				<button id="btn-hour-dn">&#9660; back 1 hour</button>
			</div>
			<div id="popover" class="popover">
				<div class="sheet-handle"></div>
				<div id="sheet-content" class="sheet-content"></div>
			</div>
			<div id="hidden-selectors" class="hidden">
				<div id="tzSelector1" class="tz-selector-grid"></div>
				<div id="tzSelector2" class="tz-selector-grid"></div>
			</div>
			<dialog id="dlg-time-modal">
				<form method="dialog">
					<label for="timeInput">Select time:</label>
					<input type="datetime-local" id="timeInput" name="timeInput" required>
					<button type="submit">Submit</button>
					<button type="button" id="btn-timeInput-cancel">Cancel</button>
				</form>
			</dialog>
		</div>

	</body>
